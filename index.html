<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>QX ZERO VIP</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Cormorant+Garamond:wght@300;400;600&display=swap');

:root { 
  --bg: #0a0a0a; 
  --panel: #111111; 
  --border: #2a2a2a; 
  --text: #f5f5f5; 
  --accent: #c9a962;
  --accent-light: #e8d5a3;
  --bull: #22c55e;
  --bear: #ef4444;
}

* { 
  margin: 0; 
  padding: 0; 
  box-sizing: border-box; 
}

html, body { 
  height: 100%; 
  background: var(--bg);
  color: var(--text); 
  overflow: hidden;
  font-family: 'Cormorant Garamond', serif;
  -webkit-font-smoothing: antialiased;
}

/* Background Pattern */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: 
    repeating-linear-gradient(45deg, transparent, transparent 35px, rgba(201, 169, 98, 0.02) 35px, rgba(201, 169, 98, 0.02) 70px);
  pointer-events: none;
  z-index: 0;
}

/* Main Container */
#main-container {
  height: calc(100% - 60px);
  overflow-y: auto;
  position: relative;
  z-index: 1;
  padding: 15px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* Signal Page */
#signal-page {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  max-width: 380px;
}

/* Compact Luxury Card */
.luxury-card {
  background: linear-gradient(145deg, #0f0f0f, #1a1a1a);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 35px 28px;
  width: 100%;
  position: relative;
  box-shadow: 
    0 10px 40px rgba(0,0,0,0.9),
    0 0 0 1px rgba(201, 169, 98, 0.08),
    inset 0 1px 0 rgba(255,255,255,0.03);
}

/* Gold Corners - Smaller */
.corner {
  position: absolute;
  width: 20px; height: 20px;
  border: 1.5px solid var(--accent);
  opacity: 0.5;
}

.corner-tl { top: 10px; left: 10px; border-right: 0; border-bottom: 0; }
.corner-tr { top: 10px; right: 10px; border-left: 0; border-bottom: 0; }
.corner-bl { bottom: 10px; left: 10px; border-right: 0; border-top: 0; }
.corner-br { bottom: 10px; right: 10px; border-left: 0; border-top: 0; }

/* Header Compact */
.card-header {
  text-align: center;
  margin-bottom: 25px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}

.brand-text {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  font-weight: 900;
  color: var(--text);
  letter-spacing: 8px;
  margin-bottom: 8px;
}

.vip-badge {
  display: inline-block;
  font-family: 'Playfair Display', serif;
  font-size: 10px;
  font-weight: 400;
  color: var(--accent);
  letter-spacing: 6px;
  padding: 5px 18px;
  border: 1px solid rgba(201, 169, 98, 0.4);
  background: rgba(201, 169, 98, 0.03);
}

/* Divider Compact */
.divider {
  width: 40px;
  height: 1px;
  background: var(--accent);
  margin: 20px auto;
  opacity: 0.4;
}

/* Signal Details Compact */
.signal-details {
  margin: 25px 0;
}

.signal-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid rgba(42, 42, 42, 0.6);
}

.signal-row:last-child {
  border-bottom: none;
}

.signal-label {
  font-size: 10px;
  color: #666;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  font-weight: 400;
}

.signal-value {
  font-family: 'Cormorant Garamond', serif;
  font-size: 14px;
  color: var(--text);
  font-weight: 600;
  letter-spacing: 0.5px;
}

/* Direction Compact */
.direction-sell {
  color: var(--bear);
  font-weight: 700;
  font-size: 15px;
  letter-spacing: 1.5px;
}

.direction-buy {
  color: var(--bull);
  font-weight: 700;
  font-size: 15px;
  letter-spacing: 1.5px;
}

/* Footer Compact */
.card-footer {
  text-align: center;
  margin-top: 25px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}

.edition-text {
  font-family: 'Playfair Display', serif;
  font-size: 9px;
  color: var(--accent);
  letter-spacing: 3px;
  font-weight: 400;
  opacity: 0.7;
}

/* Results Page Compact */
#results-page {
  display: none;
  width: 100%;
  max-width: 380px;
  padding: 10px 0;
}

.page-title {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  text-align: center;
  color: var(--text);
  letter-spacing: 5px;
  margin-bottom: 25px;
  padding-bottom: 15px;
  border-bottom: 1px solid var(--border);
}

/* Results List Compact */
.results-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.result-item {
  background: #111;
  border: 1px solid var(--border);
  padding: 18px 20px;
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: 15px;
  align-items: center;
  transition: all 0.3s;
}

.result-item:hover {
  border-color: rgba(201, 169, 98, 0.3);
  background: #151515;
}

.result-item.win {
  border-left: 2px solid var(--bull);
}

.result-item.loss {
  border-left: 2px solid var(--bear);
}

.asset-name {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.5px;
}

.result-meta {
  font-size: 10px;
  color: #555;
  margin-top: 3px;
  letter-spacing: 0.5px;
}

.result-type {
  font-size: 9px;
  letter-spacing: 2px;
  padding: 4px 10px;
  border: 1px solid;
  text-transform: uppercase;
}

.type-sell {
  color: var(--bear);
  border-color: rgba(239, 68, 68, 0.25);
}

.type-buy {
  color: var(--bull);
  border-color: rgba(34, 197, 94, 0.25);
}

.result-outcome {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-weight: 700;
}

.outcome-win { color: var(--bull); }
.outcome-loss { color: var(--bear); }

/* Bottom Navigation Compact */
#bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0; right: 0;
  height: 60px;
  background: #0a0a0a;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: center;
  gap: 60px;
  align-items: center;
  z-index: 1000;
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  padding: 8px 25px;
  color: #444;
  transition: all 0.3s;
  border: 1px solid transparent;
}

.nav-item:hover {
  color: #888;
}

.nav-item.active {
  color: var(--accent);
  border-color: rgba(201, 169, 98, 0.3);
  background: rgba(201, 169, 98, 0.03);
}

.nav-icon {
  width: 16px; height: 16px;
  stroke-width: 1.5;
  fill: none;
  stroke: currentColor;
}

.nav-label {
  font-size: 9px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
}

/* Scrollbar Minimal */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 0; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* Very Small Screens */
@media (max-width: 380px) {
  .luxury-card { padding: 30px 22px; }
  .brand-text { font-size: 24px; letter-spacing: 6px; }
  .signal-value { font-size: 13px; }
  .asset-name { font-size: 14px; }
}
</style>
<base target="_blank">
</head>
<body>

<div id="main-container">
  <!-- Signal Page -->
  <div id="signal-page">
    <div class="luxury-card">
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>
      
      <div class="card-header">
        <div class="brand-text">QX ZERO</div>
        <div class="vip-badge">V I P</div>
      </div>

      <div class="signal-details">
        <div class="signal-row">
          <span class="signal-label">Asset Pair</span>
          <span class="signal-value">USDTRY-OTC</span>
        </div>
        
        <div class="signal-row">
          <span class="signal-label">Timeframe</span>
          <span class="signal-value">1 MINUTE</span>
        </div>
        
        <div class="signal-row">
          <span class="signal-label">Entry Time</span>
          <span class="signal-value">14:35 UTC+1</span>
        </div>
        
        <div class="signal-row">
          <span class="signal-label">Direction</span>
          <span class="signal-value direction-sell">▼ SELL</span>
        </div>
      </div>

      <div class="card-footer">
        <div class="divider"></div>
        <div class="edition-text">ROYAL GOLD EDITION</div>
      </div>
    </div>
  </div>

  <!-- Results Page -->
  <div id="results-page">
    <div class="page-title">HISTORY</div>
    
    <div class="results-list">
      <div class="result-item win">
        <div>
          <div class="asset-name">EUR/USD</div>
          <div class="result-meta">19 MAR 2026 • 14:35</div>
        </div>
        <div class="result-type type-buy">BUY</div>
        <div class="result-outcome outcome-win">+85%</div>
      </div>

      <div class="result-item loss">
        <div>
          <div class="asset-name">GBP/JPY</div>
          <div class="result-meta">19 MAR 2026 • 14:20</div>
        </div>
        <div class="result-type type-sell">SELL</div>
        <div class="result-outcome outcome-loss">-100%</div>
      </div>

      <div class="result-item win">
        <div>
          <div class="asset-name">AUD/CAD</div>
          <div class="result-meta">19 MAR 2026 • 13:55</div>
        </div>
        <div class="result-type type-buy">BUY</div>
        <div class="result-outcome outcome-win">+92%</div>
      </div>

      <div class="result-item win">
        <div>
          <div class="asset-name">USD/CHF</div>
          <div class="result-meta">19 MAR 2026 • 13:30</div>
        </div>
        <div class="result-type type-sell">SELL</div>
        <div class="result-outcome outcome-win">+88%</div>
      </div>
    </div>
  </div>
</div>

<!-- Bottom Navigation -->
<div id="bottom-nav">
  <div class="nav-item active" onclick="showPage('signal')" id="nav-signal">
    <svg class="nav-icon" viewBox="0 0 24 24">
      <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
    </svg>
    <span class="nav-label">Signals</span>
  </div>
  
  <div class="nav-item" onclick="showPage('results')" id="nav-results">
    <svg class="nav-icon" viewBox="0 0 24 24">
      <path d="M3 3v18h18"/>
      <path d="M18 17V9"/>
      <path d="M13 17V5"/>
      <path d="M8 17v-3"/>
    </svg>
    <span class="nav-label">Results</span>
  </div>
</div>

<script>
function showPage(page) {
  const signalPage = document.getElementById('signal-page');
  const resultsPage = document.getElementById('results-page');
  const navSignal = document.getElementById('nav-signal');
  const navResults = document.getElementById('nav-results');
  
  if (page === 'signal') {
    signalPage.style.display = 'flex';
    resultsPage.style.display = 'none';
    navSignal.classList.add('active');
    navResults.classList.remove('active');
  } else {
    signalPage.style.display = 'none';
    resultsPage.style.display = 'block';
    navSignal.classList.remove('active');
    navResults.classList.add('active');
  }
}

// Prevent zoom on double tap
document.addEventListener('dblclick', function(event) {
  event.preventDefault();
}, { passive: false });
</script>

</body>
</html>
