<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>QX ZERO VIP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Rajdhani:wght@300;500;600;700&display=swap" rel="stylesheet">
<style>
:root { 
  --bg: #050505; 
  --panel: #0f0f0f; 
  --border: #000000; 
  --text: #e0e0e0; 
  --gold: #d4af37;
  --gold-dim: #8a7020;
  --gold-light: #f3e5ab;
  --bull: #1eff00;
  --bear: #e20000;
  --shadow-gold: 0 0 20px rgb(2, 0, 121);
}

* { 
  margin: 0; 
  padding: 0; 
  box-sizing: border-box; 
  -webkit-tap-highlight-color: transparent;
}

html, body { 
  height: 100%; 
  background: var(--bg);
  color: var(--text); 
  overflow: hidden;
  font-family: 'Rajdhani', sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* Dynamic Background */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: 
    radial-gradient(circle at 50% 0%, rgb(1, 3, 124) 0%, transparent 50%),
    repeating-linear-gradient(0deg, transparent, transparent 1px, rgb(11, 1, 109) 1px, rgb(1, 3, 110) 2px);
  background-size: 100% 100%, 100% 4px;
  pointer-events: none;
  z-index: 0;
}

/* Main Container */
#main-container {
  height: calc(100% - 80px);
  overflow-y: auto;
  position: relative;
  z-index: 1;
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* Signal Page */
#signal-page {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  max-width: 400px;
  animation: fadeIn 0.8s ease-out;
}

/* Ultra Luxury Card */
.luxury-card {
  background: linear-gradient(135deg, #0a0a0a 0%, #000000 100%);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 40px 30px;
  width: 100%;
  position: relative;
  box-shadow: 
    0 20px 60px rgba(0,0,0,0.8),
    0 0 0 1px rgb(2, 1, 104),
    inset 0 0 40px rgba(0,0,0,0.5);
  overflow: hidden;
}

/* Gold Glow Effect */
.luxury-card::after {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(circle, rgb(1, 3, 133) 0%, transparent 70%);
  pointer-events: none;
  animation: rotate 20s linear infinite;
}

/* Ornate Corners */
.corner {
  position: absolute;
  width: 30px; height: 30px;
  border: 2px solid var(--gold);
  opacity: 0.8;
  transition: all 0.5s ease;
}

.corner-tl { 
  top: 15px; left: 15px; 
  border-right: 0; border-bottom: 0; 
  box-shadow: 2px -2px 10px rgba(2, 4, 119, 0.993);
}
.corner-tr { 
  top: 15px; right: 15px; 
  border-left: 0; border-bottom: 0; 
  box-shadow: -2px -2px 10px rgb(1, 9, 117);
}
.corner-bl { 
  bottom: 15px; left: 15px; 
  border-right: 0; border-top: 0; 
  box-shadow: 2px 2px 10px rgb(15, 2, 128);
}
.corner-br { 
  bottom: 15px; right: 15px; 
  border-left: 0; border-top: 0; 
  box-shadow: -2px 2px 10px rgba(17, 3, 219, 0.3);
}

/* Header */
.card-header {
  text-align: center;
  margin-bottom: 35px;
  padding-bottom: 25px;
  border-bottom: 1px solid rgba(212, 175, 55, 0.2);
  position: relative;
}

.brand-text {
  font-family: 'Cinzel', serif;
  font-size: 36px;
  font-weight: 900;
  background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dim) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 12px;
  margin-bottom: 12px;
  text-shadow: 0 2px 10px rgba(212, 175, 55, 0.3);
}

.vip-badge {
  display: inline-block;
  font-family: 'Cinzel', serif;
  font-size: 12px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 8px;
  padding: 8px 24px;
  border: 1px solid var(--gold);
  background: rgba(212, 175, 55, 0.05);
  box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
  position: relative;
}

.vip-badge::before, .vip-badge::after {
  content: '♦';
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 8px;
  color: var(--gold);
}

.vip-badge::before { left: 8px; }
.vip-badge::after { right: 8px; }

/* Divider */
.divider {
  width: 60px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 30px auto;
  opacity: 0.6;
}

/* Signal Details */
.signal-details {
  margin: 30px 0;
}

.signal-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 0;
  border-bottom: 1px solid rgba(42, 42, 42, 0.5);
  transition: all 0.3s;
}

.signal-row:hover {
  border-bottom-color: rgba(4, 30, 177, 0.3);
}

.signal-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.signal-icon {
  width: 20px;
  height: 20px;
  stroke: var(--gold);
  stroke-width: 1.5;
  fill: none;
  opacity: 0.8;
  flex-shrink: 0;
}

.signal-label {
  font-size: 11px;
  color: #666;
  letter-spacing: 3px;
  text-transform: uppercase;
  font-weight: 500;
}

.signal-value {
  font-family: 'Rajdhani', sans-serif;
  font-size: 16px;
  color: var(--text);
  font-weight: 600;
  letter-spacing: 1px;
}

/* Direction */
.direction-sell {
  color: var(--bear);
  font-weight: 700;
  font-size: 18px;
  letter-spacing: 2px;
  text-shadow: 0 0 10px rgb(238, 0, 0);
}

.direction-buy {
  color: var(--bull);
  font-weight: 700;
  font-size: 18px;
  letter-spacing: 2px;
  text-shadow: 0 0 10px rgba(6, 216, 16, 0.897);
}

/* Footer */
.card-footer {
  text-align: center;
  margin-top: 35px;
  padding-top: 25px;
  border-top: 1px solid rgba(212, 175, 55, 0.15);
}

.edition-text {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  color: var(--gold);
  letter-spacing: 4px;
  font-weight: 400;
  opacity: 0.8;
}

/* Results Page */
#results-page {
  display: none;
  width: 100%;
  max-width: 400px;
  padding: 10px 0;
  animation: fadeIn 0.8s ease-out;
}

.page-title {
  font-family: 'Cinzel', serif;
  font-size: 24px;
  text-align: center;
  color: var(--gold);
  letter-spacing: 6px;
  margin-bottom: 30px;
  padding-bottom: 20px;
  border-bottom: 1px solid rgba(212, 175, 55, 0.2);
}

/* Results List */
.results-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.result-item {
  background: linear-gradient(135deg, #0f0f0f, #161616);
  border: 1px solid var(--border);
  padding: 20px 24px;
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: 20px;
  align-items: center;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
}

.result-item::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px;
  height: 100%;
  background: var(--border);
  transition: all 0.3s;
}

.result-item:hover {
  border-color: rgba(212, 175, 55, 0.4);
  background: #1a1a1a;
  transform: translateX(5px);
}

.result-item.win::before {
  background: var(--bull);
  box-shadow: 0 0 10px var(--bull);
}

.result-item.loss::before {
  background: var(--bear);
  box-shadow: 0 0 10px var(--bear);
}

.asset-name {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 0.5px;
  color: var(--text);
}

.result-meta {
  font-size: 10px;
  color: #555;
  margin-top: 4px;
  letter-spacing: 0.5px;
}

.result-type {
  font-size: 10px;
  letter-spacing: 2px;
  padding: 6px 12px;
  border: 1px solid;
  text-transform: uppercase;
  font-weight: 600;
}

.type-sell {
  color: var(--bear);
  border-color: rgba(255, 59, 59, 0.3);
  background: rgba(255, 59, 59, 0.05);
}

.type-buy {
  color: var(--bull);
  border-color: rgba(0, 255, 157, 0.3);
  background: rgba(0, 255, 157, 0.05);
}

.result-outcome {
  font-family: 'Cinzel', serif;
  font-size: 20px;
  font-weight: 700;
}

.outcome-win { 
  color: var(--bull);
  text-shadow: 0 0 10px rgba(43, 255, 0, 0.911);
}

.outcome-loss { 
  color: var(--bear);
  text-shadow: 0 0 10px rgba(224, 10, 10, 0.5);
}

/* Bottom Navigation */
#bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0; right: 0;
  height: 80px;
  background: linear-gradient(180deg, rgba(10, 10, 10, 0.95), rgba(5, 5, 5, 1));
  border-top: 1px solid rgba(212, 175, 55, 0.2);
  display: flex;
  justify-content: center;
  gap: 80px;
  align-items: center;
  z-index: 1000;
  backdrop-filter: blur(10px);
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  padding: 10px 30px;
  color: #444;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
}

.nav-item::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  height: 2px;
  background: var(--gold);
  transition: width 0.3s ease;
}

.nav-item:hover {
  color: #888;
}

.nav-item.active {
  color: var(--gold);
}

.nav-item.active::after {
  width: 40px;
}

.nav-icon {
  width: 24px; height: 24px;
  stroke-width: 1.5;
  fill: none;
  stroke: currentColor;
  transition: all 0.3s;
}

.nav-item.active .nav-icon {
  filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.6));
}

.nav-label {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  font-weight: 600;
}

/* Animations */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes rotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* Scrollbar */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 0; }
::-webkit-scrollbar-thumb:hover { background: var(--gold); }

/* Responsive */
@media (max-width: 400px) {
  .luxury-card { padding: 35px 25px; }
  .brand-text { font-size: 30px; letter-spacing: 10px; }
  .signal-value { font-size: 15px; }
  .asset-name { font-size: 15px; }
  #bottom-nav { gap: 60px; }
}
</style>
</head>
<body>

<div id="main-container">
  <!-- Signal Page -->
  <div id="signal-page">
    <div class="luxury-card">
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>
      
      <div class="card-header">
        <div class="brand-text">QX ZERO</div>
        <div class="vip-badge">V I P</div>
      </div>

      <div class="signal-details">
        <div class="signal-row">
          <div class="signal-left">
            <svg class="signal-icon" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="9"/>
              <path d="M12 7v5l3 3"/>
            </svg>
            <span class="signal-label">Asset Pair</span>
          </div>
          <span class="signal-value">USDTRY-OTC</span>
        </div>
        
        <div class="signal-row">
          <div class="signal-left">
            <svg class="signal-icon" viewBox="0 0 24 24">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <path d="M16 2v4M8 2v4M3 10h18"/>
            </svg>
            <span class="signal-label">Timeframe</span>
          </div>
          <span class="signal-value">1 MINUTE</span>
        </div>
        
        <div class="signal-row">
          <div class="signal-left">
            <svg class="signal-icon" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10"/>
              <path d="M12 6v6l4 2"/>
            </svg>
            <span class="signal-label">Entry Time</span>
          </div>
          <span class="signal-value">14:35 UTC+1</span>
        </div>
        
        <div class="signal-row">
          <div class="signal-left">
            <svg class="signal-icon" viewBox="0 0 24 24">
              <path d="M12 19V5M5 12l7-7 7 7"/>
            </svg>
            <span class="signal-label">Direction</span>
          </div>
          <span class="signal-value direction-sell">▼ SELL</span>
        </div>
      </div>

      <div class="card-footer">
        <div class="divider"></div>
        <div class="edition-text">ROYAL GOLD EDITION</div>
      </div>
    </div>
  </div>

  <!-- Results Page -->
  <div id="results-page">
    <div class="page-title">HISTORY</div>
    
    <div class="results-list">
      <div class="result-item win">
        <div>
          <div class="asset-name">EUR/USD</div>
          <div class="result-meta">19 MAR 2026 • 14:35</div>
        </div>
        <div class="result-type type-buy">BUY</div>
        <div class="result-outcome outcome-win">+85%</div>
      </div>

      <div class="result-item loss">
        <div>
          <div class="asset-name">GBP/JPY</div>
          <div class="result-meta">19 MAR 2026 • 14:20</div>
        </div>
        <div class="result-type type-sell">SELL</div>
        <div class="result-outcome outcome-loss">-100%</div>
      </div>

      <div class="result-item win">
        <div>
          <div class="asset-name">AUD/CAD</div>
          <div class="result-meta">19 MAR 2026 • 13:55</div>
        </div>
        <div class="result-type type-buy">BUY</div>
        <div class="result-outcome outcome-win">+92%</div>
      </div>

      <div class="result-item win">
        <div>
          <div class="asset-name">USD/CHF</div>
          <div class="result-meta">19 MAR 2026 • 13:30</div>
        </div>
        <div class="result-type type-sell">SELL</div>
        <div class="result-outcome outcome-win">+88%</div>
      </div>
    </div>
  </div>
</div>

<!-- Bottom Navigation -->
<div id="bottom-nav">
  <div class="nav-item active" onclick="showPage('signal')" id="nav-signal">
    <svg class="nav-icon" viewBox="0 0 24 24">
      <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
    </svg>
    <span class="nav-label">Signals</span>
  </div>
  
  <div class="nav-item" onclick="showPage('results')" id="nav-results">
    <svg class="nav-icon" viewBox="0 0 24 24">
      <path d="M3 3v18h18"/>
      <path d="M18 17V9"/>
      <path d="M13 17V5"/>
      <path d="M8 17v-3"/>
    </svg>
    <span class="nav-label">Results</span>
  </div>
</div>

<script>
function showPage(page) {
  const signalPage = document.getElementById('signal-page');
  const resultsPage = document.getElementById('results-page');
  const navSignal = document.getElementById('nav-signal');
  const navResults = document.getElementById('nav-results');
  
  if (page === 'signal') {
    signalPage.style.display = 'flex';
    resultsPage.style.display = 'none';
    navSignal.classList.add('active');
    navResults.classList.remove('active');
  } else {
    signalPage.style.display = 'none';
    resultsPage.style.display = 'block';
    navSignal.classList.remove('active');
    navResults.classList.add('active');
  }
}

// Prevent zoom on double tap
document.addEventListener('dblclick', function(event) {
  event.preventDefault();
}, { passive: false });
</script>

</body>
</html>
